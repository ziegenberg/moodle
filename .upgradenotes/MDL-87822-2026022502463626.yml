issueNumber: MDL-87822
notes:
  core_files:
    - message: >
        A new method called `removeopt()` has been created in the `curl` class
        to allow users to remove options previously set with `setopt()`.
      type: improved
    - message: >
        User can pass `'CURLOPT_USERPWD' => false` to the `$options` array for
        the `put()` method of `curl` to remove the `CURLOPT_USERPWD` option from
        the request.
      type: improved
