issueNumber: MDL-87350
notes:
  core:
    - message: >-
        MoodleNet outbound sharing functionality has been removed. All classes,
        functions, web services, and entry files related to outbound sharing
        have been removed. The OAuth2 service type 'moodlenet' has also been
        removed. There is no replacement for this functionality as MoodleNet
        outbound sharing was an experimental feature that is being discontinued.
      type: removed
