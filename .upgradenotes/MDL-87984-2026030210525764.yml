issueNumber: MDL-87984
notes:
  core_course:
    - message: >-
        The `cm_info` class now includes `get_navigation_url()`,
        `set_navigation_url(?url $url)`, and `reset_navigation_url()` methods,
        allowing activities to explicitly define, override, or suppress their
        navigation URL. This customisation can be managed within the
        `cm_info_dynamic callback`. By setting the navigation URL to null, a
        module can be effectively excluded from the linear navigation flow,
        such as the automatic "Previous" and "Next" routing URLs. In cases where
        no override is specified, `get_navigation_url()` will return the default
        `$cm->url` by fallback.
      type: improved
